<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Thesis Background GLB Viewer</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1a1a1a; }
        canvas { display: block; }
        #ui { position: absolute; top: 10px; left: 10px; z-index: 100; color: white; font-family: sans-serif; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px;}
        input[type="file"] { color: white; }
    </style>
</head>
<body>
    <div id="ui">
        <h2>3D Scene Viewer</h2>
        <input type="file" id="fileInput" accept=".glb, .gltf">
        <p>Use Left Click to Rotate, Right Click to Pan, Scroll to Zoom.</p>
    </div>
    <script type="module">
        import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js';
        import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/controls/OrbitControls.js';
        import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/loaders/GLTFLoader.js';

        let scene, camera, renderer, controls;
        
        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x222222);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 5);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
            directionalLight.position.set(10, 20, 10);
            scene.add(directionalLight);

            window.addEventListener('resize', onWindowResize);

            document.getElementById('fileInput').addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (!file) return;

                const url = URL.createObjectURL(file);
                const loader = new GLTFLoader();
                
                // Remove older loaded scenes
                const toRemove = [];
                scene.traverse(child => {
                    if (child.type === "Group" && child.name === "loaded_scene") {
                        toRemove.push(child);
                    }
                });
                toRemove.forEach(c => scene.remove(c));

                loader.load(url, function(gltf) {
                    gltf.scene.name = "loaded_scene";
                    scene.add(gltf.scene);
                    
                    // Fit camera to object
                    const box = new THREE.Box3().setFromObject(gltf.scene);
                    const center = box.getCenter(new THREE.Vector3());
                    const size = box.getSize(new THREE.Vector3());
                    const maxDim = Math.max(size.x, size.y, size.z);
                    const fov = camera.fov * (Math.PI / 180);
                    let cameraZ = Math.abs(maxDim / 2 / Math.tan(fov / 2));
                    camera.position.set(center.x, center.y, center.z + cameraZ * 1.5);
                    controls.target.copy(center);
                    controls.update();

                }, undefined, function(error) {
                    console.error(error);
                    alert("Error loading GLB!");
                });
            });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
